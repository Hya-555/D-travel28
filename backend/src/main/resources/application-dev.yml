# =====================================================
# 开发环境配置 - H2 内存数据库
# =====================================================
spring:
  datasource:
    url: jdbc:h2:mem:travel_system;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

logging:
  level:
    com.travel: debug
